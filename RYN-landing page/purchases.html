<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Bag | RYN | Pure Vision</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.316.0/lucide.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Background Accents -->
    <div class="orb w-[50vw] h-[50vw] bg-blue-100/40 top-[-10%] left-[-10%]"></div>
    <div class="orb w-[40vw] h-[40vw] bg-zinc-200/40 bottom-[10%] right-[-5%]"></div>

    <!-- Navigation -->
    <nav class="fixed w-full z-50 px-6 py-6">
        <div class="max-w-5xl mx-auto flex items-center justify-between glass-nav rounded-2xl px-8 h-16">
            <a href="index.html" class="text-2xl font-black italic tracking-tighter hover:opacity-70 transition-opacity">RYN.</a>
            
            <div class="hidden md:flex items-center space-x-12 text-[10px] font-bold tracking-[0.2em] uppercase text-zinc-500">
                <a href="index.html#new-drops" class="hover:text-black transition-colors">Drops</a>
                <a href="index.html#trending" class="hover:text-black transition-colors">Trending</a>
                <a href="index.html#shop" class="hover:text-black transition-colors">Shop</a>
            </div>

            <a href="purchases.html" class="bg-zinc-900 text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest hover:scale-105 transition-all cursor-pointer">
                Bag (<span id="cart-count">0</span>)
            </a>
        </div>
    </nav>

    <!-- Bag Section -->
    <section class="relative min-h-screen flex flex-col items-center justify-center pt-32 pb-20 px-6 z-10">
        <div class="w-full max-w-4xl animate-reveal">
            <div class="mb-20">
                <h1 class="text-7xl md:text-[100px] font-black italic hero-title mb-6">YOUR BAG</h1>
                <p class="text-zinc-400 text-sm">Review your selections below</p>
            </div>

            <!-- Cart Items -->
            <div id="cart-items-container" class="space-y-6 mb-12">
                <!-- Items will be inserted here -->
            </div>

            <!-- Empty Cart Message -->
            <div id="empty-cart" class="text-center py-20">
                <p class="text-zinc-400 text-lg mb-8">Your bag is empty</p>
                <a href="index.html" class="inline-block bg-zinc-900 text-white px-8 py-4 rounded-xl font-black uppercase text-[10px] tracking-widest hover:bg-black transition-all">
                    Continue Shopping
                </a>
            </div>

            <!-- Cart Summary -->
            <div id="cart-summary" class="mt-16 glass-card p-10 rounded-[2.5rem] space-y-6">
                <div class="flex justify-between items-center text-lg">
                    <span class="font-bold text-zinc-600">Subtotal</span>
                    <span class="font-black">$<span id="subtotal">0.00</span></span>
                </div>
                <div class="flex justify-between items-center text-lg">
                    <span class="font-bold text-zinc-600">Shipping</span>
                    <span class="font-black">$<span id="shipping">0.00</span></span>
                </div>
                <div class="flex justify-between items-center text-lg">
                    <span class="font-bold text-zinc-600">Tax</span>
                    <span class="font-black">$<span id="tax">0.00</span></span>
                </div>
                <div class="border-t border-zinc-200 pt-6 flex justify-between items-center text-xl">
                    <span class="font-black">TOTAL</span>
                    <span class="font-black text-2xl">$<span id="total">0.00</span></span>
                </div>
                <button id="checkout-btn" class="w-full bg-zinc-900 text-white py-5 rounded-2xl font-black uppercase text-[10px] tracking-widest hover:bg-black hover:scale-[1.02] active:scale-[0.98] transition-all shadow-xl shadow-zinc-200 disabled:opacity-50 disabled:cursor-not-allowed">
                    Proceed to Checkout
                </button>
                <a href="index.html" class="block text-center text-zinc-400 text-xs font-bold uppercase tracking-widest hover:text-black transition-colors">
                    Continue Shopping
                </a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="py-20 px-6 border-t border-zinc-100 relative z-10 bg-[#fafafa]">
        <div class="max-w-5xl mx-auto flex flex-col md:flex-row justify-between items-center gap-10">
            <div class="text-xl font-black italic">RYN.</div>
            <div class="flex space-x-12 text-[10px] font-black uppercase tracking-[0.3em] text-zinc-400">
                <a href="#" class="hover:text-black">Terms</a>
                <a href="#" class="hover:text-black">Journal</a>
                <a href="#" class="hover:text-black">Contact</a>
            </div>
            <div class="flex space-x-6 text-zinc-300">
                <i data-lucide="instagram" class="w-5 h-5 hover:text-black cursor-pointer"></i>
                <i data-lucide="twitter" class="w-5 h-5 hover:text-black cursor-pointer"></i>
            </div>
        </div>
        <div class="mt-12 text-center text-[10px] font-bold text-zinc-300 tracking-widest uppercase">
            © RYN OPTICS LAB 2024
        </div>
    </footer>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="purchases-script.js"></script>
</body>
</html>
